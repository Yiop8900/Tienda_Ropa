<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login – Tienda Ropa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="admin-login-body d-flex align-items-center justify-content-center min-vh-100">

  <div class="card border-0 shadow-lg rounded-4 p-4" style="width:100%;max-width:400px">
    <div class="text-center mb-4">
      <i class="bi bi-bag-heart-fill text-warning" style="font-size:3rem"></i>
      <h3 class="fw-bold mt-2">Panel de Administración</h3>
      <p class="text-muted small mb-0">Tienda Ropa</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat, msg in messages %}
        <div class="alert alert-{{ 'success' if cat=='success' else 'danger' if cat=='error' else 'info' }} py-2">
          {{ msg }}
        </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold">Usuario</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0">
            <i class="bi bi-person text-muted"></i>
          </span>
          <input type="text" name="username" class="form-control border-start-0"
                 placeholder="admin" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0">
            <i class="bi bi-lock text-muted"></i>
          </span>
          <input type="password" name="password" class="form-control border-start-0"
                 placeholder="••••••••" required>
        </div>
      </div>
      <button type="submit" class="btn btn-dark w-100 py-2 rounded-pill fw-semibold">
        <i class="bi bi-box-arrow-in-right me-2"></i> Iniciar sesión
      </button>
    </form>

    <div class="text-center mt-3">
      <a href="{{ url_for('index') }}" class="text-muted small text-decoration-none">
        <i class="bi bi-arrow-left me-1"></i> Volver a la tienda
      </a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
